name: "🔧 Infra Task"
description: Request an infrastructure change (env variable, config, secret, etc.)
labels: ["infra-task"]
projects: ["epam/68"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to request infrastructure changes such as adding/updating environment variables, secrets, or configuration values.
        List each change as a separate checklist item so it can be tracked and marked done individually.
  - type: dropdown
    id: change-type
    attributes:
      label: Type of change
      options:
        - env variable
        - config change
        - secret
        - other
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Target environment
      options:
        - development
        - tst
        - staging
        - production
        - all
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: Task list
      description: |
        List each change as a checklist item. Use the format below — one item per line.
        The AI will mark each item [x] when done and leave notes if needed.
      placeholder: |
        - [ ] configure new identity provider
        - [ ] set LOG_LEVEL=warn
        - [ ] remove LEGACY_MODE variable
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context / reason
      description: Why is this change needed? Link to a ticket, incident, or PR if applicable.
    validations:
      required: false
